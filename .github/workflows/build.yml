name: FPGA Full Build

# Run on PRs targeting main, and on direct pushes to main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Only one build per PR at a time; cancel superseded runs
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vivado-build:
    name: Vivado — Synthesis, Implementation & XSA Export
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run build.tcl (synth → impl → bitstream → XSA)
        shell: cmd
        run: |
          "C:\Xilinx\Vivado\2022.1\bin\vivado.bat" -mode batch -source build.tcl -log vivado_build.log -journal vivado_build.jou
        timeout-minutes: 90

      - name: Verify XSA was produced
        shell: powershell
        run: |
          if (-not (Test-Path "vitis\zed_os_fpga.xsa")) {
            Write-Error "vitis\zed_os_fpga.xsa not found — Vivado build failed"
            exit 1
          }
          Write-Host "XSA found: $((Get-Item 'vitis\zed_os_fpga.xsa').Length) bytes"

      - name: Upload XSA artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed_os_fpga_xsa
          path: vitis\zed_os_fpga.xsa
          retention-days: 7

      - name: Upload Vivado logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vivado-logs
          path: |
            vivado_build.log
            vivado_build.jou
          retention-days: 7

  vitis-build:
    name: Vitis — Platform + zed_vga_test + zed_os_fpga_app
    runs-on: self-hosted
    needs: vivado-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download XSA from Vivado job
        uses: actions/download-artifact@v4
        with:
          name: zed_os_fpga_xsa
          path: vitis\

      - name: Run create_vitis_project.tcl
        shell: cmd
        run: |
          "C:\Xilinx\Vitis\2022.1\bin\xsct.bat" vitis\create_vitis_project.tcl > vitis_build.log 2>&1
          type vitis_build.log
        timeout-minutes: 60

      - name: Verify ELF files were produced
        shell: powershell
        run: |
          $fail = $false
          $elfs = @(
            "vitis\workspace\zed_vga_test\Debug\zed_vga_test.elf",
            "vitis\workspace\zed_os_fpga_app\Debug\zed_os_fpga_app.elf"
          )
          foreach ($elf in $elfs) {
            if (Test-Path $elf) {
              Write-Host "OK: $elf ($((Get-Item $elf).Length) bytes)"
            } else {
              Write-Error "MISSING: $elf"
              $fail = $true
            }
          }
          if ($fail) { exit 1 }

      - name: Upload ELF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elf-binaries
          path: |
            vitis\workspace\zed_vga_test\Debug\zed_vga_test.elf
            vitis\workspace\zed_os_fpga_app\Debug\zed_os_fpga_app.elf
          retention-days: 7

      - name: Upload Vitis logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitis-logs
          path: vitis_build.log
          retention-days: 7

      - name: Clean workspace for next run
        if: always()
        shell: powershell
        run: |
          # Remove generated artifacts so next run starts clean.
          # Source files tracked in git are left untouched.
          Remove-Item -Force  -ErrorAction SilentlyContinue "vitis\zed_os_fpga.xsa"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_os_fpga_platform"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_vga_test_system"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_vga_test\Debug"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_vga_test\Release"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_vga_test\_ide"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_os_fpga_app_system"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_os_fpga_app\Debug"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_os_fpga_app\Release"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\zed_os_fpga_app\_ide"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "vitis\workspace\.metadata"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "zed_os_fpga"
